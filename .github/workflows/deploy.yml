# CI — build check on every PR
#
# Vercel handles production and preview deployments automatically via its
# GitHub integration (configured in the Vercel dashboard). This workflow
# exists only to catch TypeScript and build errors before merge — it does
# NOT deploy anywhere.
#
# WHY we removed the GitHub Pages deploy:
#   Vercel is required for PPR (Partial Pre-rendering / Cache Components).
#   GitHub Pages serves only pre-built static files with no server runtime,
#   so it cannot stream the HTML that PPR depends on.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
